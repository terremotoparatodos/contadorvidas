<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Overlay Muertes</title>
  <style>
    @font-face {
      font-family: "Pokemon";
      src: url("https://raw.githubusercontent.com/PokemonDB/font/main/pokemon-gb.ttf") format("truetype");
      font-display: block;
    }
    @font-face {
      font-family: "PokemonFallback";
      src: url("https://fonts.gstatic.com/s/pressstart2p/v15/e3t4euO8T-267oIAQAu6jDQyK3nVivNm4I81.woff2") format("woff2");
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
    }

    .overlay {
      position: fixed;
      bottom: 72px;
      left: 88px;
    }

    .wrapper {
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .botones {
      display: flex;
      flex-direction: column;
      gap: 16px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
    }

    .wrapper:hover .botones {
      opacity: 1;
      pointer-events: all;
    }

    .btn {
      font-family: "Pokemon", "PokemonFallback", monospace;
      font-size: 52px;
      width: 112px;
      height: 112px;
      border: none;
      border-radius: 24px;
      cursor: pointer;
      line-height: 1;
      transition: transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn:active { transform: scale(0.88); }

    .btn-mas {
      background: linear-gradient(135deg, rgba(155,89,182,0.9), rgba(108,52,131,0.9));
      color: white;
      box-shadow: 0 8px 0 rgba(60,20,90,0.5), 0 0 32px rgba(155,89,182,0.4);
    }

    .btn-menos {
      background: linear-gradient(135deg, rgba(212,122,176,0.9), rgba(160,72,128,0.9));
      color: white;
      box-shadow: 0 8px 0 rgba(90,20,60,0.5), 0 0 32px rgba(212,122,176,0.4);
    }

    .contador {
      display: flex;
      align-items: center;
      gap: 40px;
      background: linear-gradient(135deg, rgba(255,182,213,0.85) 0%, rgba(200,170,230,0.85) 100%);
      border: 8px solid rgba(255,255,255,0.6);
      border-radius: 32px;
      padding: 32px 64px 32px 48px;
      box-shadow:
        0 0 0 4px rgba(180,120,220,0.4),
        0 16px 72px rgba(160,80,200,0.3),
        inset 0 4px 0 rgba(255,255,255,0.5);
      backdrop-filter: blur(4px);
    }

    .icono { font-size: 80px; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3)); }

    .texto-wrap {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      line-height: 1;
    }

    .numero {
      font-family: "Pokemon", "PokemonFallback", monospace;
      font-size: 80px;
      color: #2a1a4a;
      text-shadow: 4px 4px 0 rgba(255,255,255,0.6), 0 0 32px rgba(200,100,240,0.4);
      letter-spacing: 4px;
    }

    .label {
      font-family: "Pokemon", "PokemonFallback", monospace;
      font-size: 32px;
      color: #5a3a7a;
      letter-spacing: 2px;
      margin-top: 12px;
      opacity: 0.85;
    }

    .numero.guardado {
      text-shadow: 4px 4px 0 rgba(255,255,255,0.6), 0 0 56px rgba(120,255,160,0.8);
    }
  </style>
</head>
<body>

  <div class="overlay">
    <div class="wrapper">

      <div class="botones">
        <button class="btn btn-mas"   onclick="cambiar(+1)">+</button>
        <button class="btn btn-menos" onclick="cambiar(-1)">−</button>
      </div>

      <div class="contador">
        <span class="icono">💀</span>
        <div class="texto-wrap">
          <span class="numero" id="numero">0</span>
          <span class="label">muertes</span>
        </div>
      </div>

    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://gaccsgiobsjguauourvx.supabase.co";
    const SUPABASE_KEY = "sb_publishable_4Za2O2b5OyO_7YEHvrRtNQ_8EiIyvOj";

    let valorActual = 0;

    const headers = {
      "apikey": SUPABASE_KEY,
      "Authorization": `Bearer ${SUPABASE_KEY}`,
      "Content-Type": "application/json",
      "Prefer": "return=representation"
    };

    async function fetchMuertes() {
      try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/muertes?id=eq.1&select=valor`, { headers });
        const data = await res.json();
        if (data && data[0] !== undefined) {
          valorActual = data[0].valor;
          document.getElementById("numero").textContent = valorActual;
        }
      } catch (e) {
        console.error("Error fetching muertes:", e);
      }
    }

    async function cambiar(delta) {
      const nuevo = Math.max(0, valorActual + delta);
      try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/muertes?id=eq.1`, {
          method: "PATCH",
          headers,
          body: JSON.stringify({ valor: nuevo })
        });
        if (res.ok) {
          valorActual = nuevo;
          const el = document.getElementById("numero");
          el.textContent = valorActual;
          el.classList.add("guardado");
          setTimeout(() => el.classList.remove("guardado"), 400);
        }
      } catch (e) {
        console.error("Error guardando:", e);
      }
    }

    fetchMuertes();
    setInterval(fetchMuertes, 3000);
  </script>

</body>
</html>
